specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Red Hat Enterprise Linux 8
providerId: red-hat-enterprise-linux-8
publisherName: Red Hat, Inc.
serviceCategory: Operating System Subscription
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Linux
  - Operating System
  - Subscription
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for Red Hat Enterprise Linux subscriptions. Billing is
  per-system / per-socket-pair / per-hypervisor on annual or multi-year terms; cloud-marketplace
  (AWS / Azure / GCP) consumption shifts the same SKUs onto pay-as-you-go hourly metering.
sources:
  - https://www.redhat.com/en/store/linux-platforms
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Red Hat Enterprise Linux
  ServiceCategory: Operating System Subscription
  ProviderName: Red Hat
  PublisherName: Red Hat, Inc.
  InvoiceIssuerName: Red Hat, Inc.
  BillingCurrency: USD
meters:
  - name: server_subscription
    description: Annual RHEL Server subscription per pair of sockets / pair of virtual guests
    unit: socket-pair-year
    aggregation: sum
    dimensions:
      - sku
      - support_level
      - architecture
  - name: workstation_subscription
    description: Annual RHEL Workstation subscription per system
    unit: system-year
    aggregation: sum
    dimensions:
      - sku
      - support_level
  - name: virtual_datacenter_subscription
    description: Annual RHEL for Virtual Datacenters subscription per hypervisor (unlimited guests)
    unit: hypervisor-year
    aggregation: sum
    dimensions:
      - sku
      - support_level
  - name: sap_subscription
    description: Annual RHEL for SAP Solutions subscription
    unit: socket-pair-year
    aggregation: sum
    dimensions:
      - sku
      - support_level
  - name: power_le_subscription
    description: Annual RHEL for IBM Power Little Endian subscription
    unit: socket-pair-year
    aggregation: sum
    dimensions:
      - sku
      - support_level
principles:
  - name: Visibility
    description: Use Red Hat Subscription Management and Red Hat Insights to inventory which
      systems are consuming which RHEL SKUs against active entitlements.
  - name: Allocation
    description: Allocate entitlement consumption to teams via Red Hat Customer Portal account
      hierarchy or via host-level CMDB tags; cloud-marketplace RHEL is allocated through the
      cloud bill instead.
  - name: Optimization
    description: Convert dense virtualization estates from per-socket Server SKUs to RH00002
      (Virtual Datacenter) for unlimited guests; consolidate SAP workloads on RH00764; commit
      to multi-year terms for renewal discount.
  - name: Accountability
    description: Procurement owns the master Red Hat agreement; platform/infrastructure teams
      own per-system entitlement consumption.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
