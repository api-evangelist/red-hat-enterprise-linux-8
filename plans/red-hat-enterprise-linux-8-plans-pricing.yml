description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: red-hat-enterprise-linux-8-free
    name: Free
    type: freemium
    description: Free entry tier for the Red Hat Enterprise Linux 8 API surface. Intended for evaluation,
      prototyping, and low-volume integrations. Real limits and pricing must be reconciled with the provider's
      published plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://api.access.redhat.com/management/v1
          - https://console.redhat.com/api/insights/v1
          - https://console.redhat.com/api/image-builder/v1
          - https://console.redhat.com/api/patch/v3
          - https://console.redhat.com/api/vulnerability/v1
          - https://console.redhat.com/api/compliance/v2
          - https://access.redhat.com/labs/securitydataapi
          - https://console.redhat.com/api/inventory/v1
          - https://localhost:9090/cockpit
          - https://console.redhat.com/ansible/automation-hub/
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://api.access.redhat.com/management/v1
          - https://console.redhat.com/api/insights/v1
          - https://console.redhat.com/api/image-builder/v1
          - https://console.redhat.com/api/patch/v3
          - https://console.redhat.com/api/vulnerability/v1
          - https://console.redhat.com/api/compliance/v2
          - https://access.redhat.com/labs/securitydataapi
          - https://console.redhat.com/api/inventory/v1
          - https://localhost:9090/cockpit
          - https://console.redhat.com/ansible/automation-hub/
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: RHEL 8 Subscription Management API
      - name: RHEL 8 Insights API
      - name: RHEL 8 Image Builder API
      - name: RHEL 8 Patch Management API
      - name: RHEL 8 Vulnerability Management API
      - name: RHEL 8 Compliance API
      - name: RHEL 8 Security Data API
      - name: RHEL 8 Host Inventory API
  - id: red-hat-enterprise-linux-8-pro
    name: Professional
    type: paid
    description: Production tier for Red Hat Enterprise Linux 8. Provides higher quotas, priority support,
      and access to the broader API portfolio. Pricing placeholder; align with the provider's pricing
      page.
    entries:
      - label: API Requests
        description: Monthly API request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - https://api.access.redhat.com/management/v1
          - https://console.redhat.com/api/insights/v1
          - https://console.redhat.com/api/image-builder/v1
          - https://console.redhat.com/api/patch/v3
          - https://console.redhat.com/api/vulnerability/v1
          - https://console.redhat.com/api/compliance/v2
          - https://access.redhat.com/labs/securitydataapi
          - https://console.redhat.com/api/inventory/v1
          - https://localhost:9090/cockpit
          - https://console.redhat.com/ansible/automation-hub/
        unit: 1
        price: TBD
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the professional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        domains:
          - https://api.access.redhat.com/management/v1
          - https://console.redhat.com/api/insights/v1
          - https://console.redhat.com/api/image-builder/v1
          - https://console.redhat.com/api/patch/v3
          - https://console.redhat.com/api/vulnerability/v1
          - https://console.redhat.com/api/compliance/v2
          - https://access.redhat.com/labs/securitydataapi
          - https://console.redhat.com/api/inventory/v1
          - https://localhost:9090/cockpit
          - https://console.redhat.com/ansible/automation-hub/
        unit: 1
        price: '0.00'
        userMultiplied: false
