specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Red Hat Enterprise Linux 8
providerId: red-hat-enterprise-linux-8
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Linux
  - Operating System
  - Enterprise
  - Subscription
description: Red Hat Enterprise Linux is sold as an annual per-system or per-pair-of-sockets/virtual
  guests subscription. The Red Hat Store publishes "starting at" list prices for the headline
  SKUs; volume, support level (Standard vs Premium), and multi-year terms are negotiated through
  sales.
sources:
  - https://www.redhat.com/en/store/linux-platforms
plans:
  - id: red-hat-enterprise-linux-8-server
    name: Red Hat Enterprise Linux Server
    type: subscription
    description: Operating system deployable on physical systems, cloud, or hypervisors. SKU RH00005.
    entries:
      - label: Annual subscription (starting at)
        name: rhel_server
        type: subscription
        metric: socket-pair
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: starting at $383.90
        userMultiplied: false
    elements:
      - name: SKU RH00005
      - name: Self-support / Standard / Premium options
  - id: red-hat-enterprise-linux-8-workstation
    name: Red Hat Enterprise Linux Workstation
    type: subscription
    description: Optimized for high-performance graphics and development tools. SKU RH0986300.
    entries:
      - label: Annual subscription (starting at)
        name: rhel_workstation
        type: subscription
        metric: system
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: starting at $196.90
        userMultiplied: false
    elements:
      - name: SKU RH0986300
  - id: red-hat-enterprise-linux-8-virtual-datacenter
    name: Red Hat Enterprise Linux for Virtual Datacenters
    type: subscription
    description: Unlimited guests on a dense virtualized environment. SKU RH00002.
    entries:
      - label: Annual subscription (starting at)
        name: rhel_vdc
        type: subscription
        metric: hypervisor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: starting at $2,748.90
        userMultiplied: false
    elements:
      - name: SKU RH00002
      - name: Unlimited guests per hypervisor
  - id: red-hat-enterprise-linux-8-sap
    name: Red Hat Enterprise Linux for SAP Solutions
    type: subscription
    description: RHEL with SAP-tuned content and extended support. SKU RH00764.
    entries:
      - label: Annual subscription (starting at)
        name: rhel_sap
        type: subscription
        metric: socket-pair
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: starting at $1,923.90
        userMultiplied: false
    elements:
      - name: SKU RH00764
  - id: red-hat-enterprise-linux-8-power-le
    name: Red Hat Enterprise Linux for IBM Power Little Endian
    type: subscription
    description: RHEL build for IBM Power LE architecture. SKU RH00285.
    entries:
      - label: Annual subscription (starting at)
        name: rhel_power_le
        type: subscription
        metric: socket-pair
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: starting at $295.90
        userMultiplied: false
    elements:
      - name: SKU RH00285
  - id: red-hat-enterprise-linux-8-custom
    name: Custom / Volume
    type: enterprise
    description: Multi-year terms, volume discounts, ELA agreements, and developer subscriptions
      are negotiated with Red Hat sales.
    entries:
      - label: Custom contract
        name: custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Volume discount
      - name: Multi-year term discount
      - name: Premium support upgrade
