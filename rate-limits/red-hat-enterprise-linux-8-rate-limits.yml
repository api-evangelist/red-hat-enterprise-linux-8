specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Red Hat Enterprise Linux 8
providerId: red-hat-enterprise-linux-8
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Linux
  - Operating System
  - Subscription
  - Rate Limiting
description: RHEL 8 is an operating system distribution; it does not itself expose a rate-limited
  customer API. The relevant rate-limited surfaces are Red Hat Customer Portal, Subscription
  Management, and Insights APIs, which are managed at the Red Hat account level rather than per
  RHEL release.
sources:
  - https://www.redhat.com/en/store/linux-platforms
notes: RHEL itself is not an API; rate limits live on the surrounding Red Hat platform APIs and
  are not separately published per-release.
responseCodes: {}
limits:
  - name: Customer Portal / Subscription Management
    scope: account
    metric: varies
    limit: 'managed at Red Hat account level; RHEL release does not publish its own API rate
      limits'
policies:
  - name: Account-level Enforcement
    description: Subscription/Insights/Customer Portal API throttling is applied per Red Hat
      account login; consumers should honor Retry-After when returned.
maintainers:
